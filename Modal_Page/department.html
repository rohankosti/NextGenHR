<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NextGenHR - Department</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(120deg, #007bff 60%, #6c757d 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Poppins', sans-serif;
    }

    .form-box {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 32px rgba(0, 0, 0, 0.08);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 600px;
      animation: fadeIn 1s;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: none;
      }
    }

    h2 {
      color: #007bff;
      text-align: center;
      font-weight: 700;
      margin-bottom: 2rem;
    }

    .form-label {
      font-weight: 500;
    }

    .form-control,
    .form-select,
    textarea.form-control {
      border-radius: 8px;
      transition: 0.3s;
    }

    .form-control:focus,
    .form-select:focus,
    textarea.form-control:focus {
      border-color: #007bff;
      box-shadow: 0 0 0 0.2rem rgba(0, 123, 255, .15);
    }

    .btn-primary {
      background: #007bff;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      transition: background 0.2s, transform 0.2s;
    }

    .btn-primary:hover {
      background: #0056b3;
      transform: translateY(-2px);
    }

    .row .col-md-6 {
      margin-bottom: 15px;
    }

    .small-text {
      font-size: 0.85rem;
      color: #6c757d;
      margin-top: -10px;
      margin-bottom: 10px;
      display: block;
      text-align: left;
    }
  </style>
</head>

<body>
  <div class="form-box">
    <h2>Create Department</h2>
    <form id="departmentForm">
      <!-- Department Name -->
      <div class="mb-3">
         <label for="dept_name" class="form-label">Department Name <span class="text-danger">*</span></label>
        <input type="text" class="form-control" id="dept_name" placeholder="Enter department name" required>
      </div>

      <div class="row">
        <!-- Company -->
        <div class="col-md-6">
          <label for="company_id" class="form-label">Select Company <span class="text-danger">*</span></label>
          <input type="text"class="form-control"  id="company_id" name="" >
          <!-- <select class="form-select" id="company_id" required>
            <option value="">-- Select Company --</option>
            <option value="NextGenHR">NextGenHR </option>
          </select> -->
        </div>
        
        <!-- Branch -->
        <div class="col-md-6">
          <label for="branch_id" class="form-label">Select Branch <span class="text-danger">*</span></label>
          <input type="text"class="form-control"  id="branch_id" name="" >
          <!-- <select class="form-select" id="branch_id" required>
            <option value="">-- Select Branch --</option>
            <option value="Bapunagar">Bapunagar</option>
          </select> -->
        </div>
      </div>

      <!-- Description -->
      <div class="mb-3">
        <label for="description" class="form-label">Description</label>
        <textarea class="form-control" id="description" rows="3" placeholder="Enter description"></textarea>
      </div>

      <div id="mdg"></div>

      <button type="submit" class="btn btn-primary w-100">Create Department</button>
    </form>
  </div>

  <script>
    const form = document.getElementById('departmentForm');
    form.addEventListener('submit',async (e) => {
      e.preventDefault();
      const departmentobj = {
        dept_name: document.getElementById('dept_name').value,
        company_id: document.getElementById('company_id').value,
        branch_id: document.getElementById('branch_id').value,
        description: document.getElementById('description').value
      };

      const data = await fetch("http://localhost:3000/departmentdataapi",{
        method:"POST",
        headers:{
          "content-type":"application/json",
        },
        body:JSON.stringify(departmentobj),
      });
      // console.log(data);
      const response = await data.json()
      // console.log(response);
      if (data.ok) {
        let mdg = document.getElementById("mdg");
        mdg.innerHTML=`<div class="alert alert-success">${response.msg}</div>`
        form.reset();
        setInterval(() => {
          mdg.innerHTML="";
        }, 2000);
      }
      else{
       mdg.innerHTML=`<div class="alert alert-success">Data Can't Stored</div>`;
      }
      
      
 
    });
  </script>
</body>

</html>
