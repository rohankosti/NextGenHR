<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Create User — Bootstrap Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h3 class="card-title mb-3">Add New User</h3>

                        <form id="userForm" novalidate>
                            <div class="row g-3">

                                <div class="col-md-6">
                                    <label for="employee_id" class="form-label">Employee *</label>
                                    <select id="employee_id" name="employee_id" class="form-select" required>
                                        <option value="" disabled selected>Select employee</option>
                                        <option value="Rohan">Rohan</option>
                                        <option value="Harsh">Harsh</option>
                                    </select>
                                    <div class="invalid-feedback">Please select an employee.</div>
                                </div>

                                <div class="col-md-6">
                                    <label for="role_id" class="form-label">Role *</label>
                                    <select id="role_id" name="role_id" class="form-select" required>
                                        <option value="" disabled selected>Select role</option>
                                        <option value="Manager">Manager</option>
                                        <option value="Admin">Admin</option>
                                    </select>
                                    <div class="invalid-feedback">Please select a role.</div>
                                </div>

                                <div class="col-md-6">
                                    <label for="email" class="form-label">Email *</label>
                                    <input type="email" class="form-control" id="email" name="email" required>
                                    <div class="invalid-feedback">Please enter a valid email.</div>
                                </div>

                                <div class="col-md-6 position-relative">
                                    <label for="password" class="form-label">Password *</label>
                                    <div class="input-group">
                                        <input type="password" class="form-control" id="password" name="password"
                                            minlength="6" required>
                                        <button class="btn btn-outline-secondary" type="button"
                                            id="togglePass">Show</button>
                                        <div class="invalid-feedback">Please enter a password (min 6 chars).</div>
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <label for="status" class="form-label">Status</label>
                                    <select id="status" name="status" class="form-select">
                                        <option value="Active">Active</option>
                                        <option value="Inactive">Inactive</option>
                                    </select>
                                </div>

                                <div class="col-md-6">
                                    <label for="last_login" class="form-label">Last Login</label>
                                    <input type="datetime-local" class="form-control" id="last_login" name="last_login">
                                </div>

                                <div class="col-12 mt-3 d-flex justify-content-end">
                                    <button type="reset" class="btn btn-outline-secondary me-2">Reset</button>
                                    <button type="submit" class="btn btn-primary">Save User</button>
                                </div>
                            </div>
                        </form>

                        <div id="alertBox" class="mt-3"></div>

                    </div>
                </div>



            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>

        //API for Fetch employe.html data to server
        const userForm = document.getElementById("userForm");
        userForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            let employeobj = {
                employee_id: document.getElementById("employee_id").value,
                role_id: document.getElementById("role_id").value,
                email: document.getElementById("email").value,
                password: document.getElementById("password").value,
                status: document.getElementById("status").value,
                last_login: document.getElementById("last_login").value,
            }
            console.log(employeobj.employee_id);
            
            const emp_fetch = await fetch("http://localhost:3000/employedata",{
                method:"POST",
                headers:{
                    "Content-Type":"application/json",
                },
                body:JSON.stringify(employeobj),
            });
            // console.log("Employee fetch:", emp_fetch);

            const emp_response = await emp_fetch.json();
            // console.log("Employee res:", emp_response);

            if (emp_fetch.ok) {
                
                let alertBox = document.getElementById("alertBox");
                alertBox.innerHTML = `<div class="alert alert-success">${emp_response.msg}</div>`;
                userForm.reset();
                setTimeout(() => {
                    alertBox.innerHTML = "";
                }, 1000);
            }
            else{
                 alertBox.innerHTML =`<div class="alert alert-danger">Data can't be stored</div>`;
            }

        })


        // Toggle password visibility
        let togglePass=  document.getElementById('togglePass').addEventListener('click', () => {
            const p = document.getElementById('password');
            if (p.type === 'password')
            {
                p.type = 'text';
               togglePass=document.getElementById('togglePass').textContent = 'Hide';
            }
            else
            {
                 p.type = 'password';
                togglePass= document.getElementById('togglePass').textContent = 'Show';
            }
          });
    </script>
</body>

</html>
